    valid_at: "2026-06-23T12:00:00+09:00"
    invalid_at: "2026-06-25T12:00:00+09:00"
    episode: sales-meeting-monday
    source_description: "営業チームSlack #deal-customer-x"
    perspective: sales
  - id: budget_800
